# Uses local uv environment so the ruff version always matches pyproject.toml.
# Setup: uv sync --extra dev && pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint + autofix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true
